name: Build Thorium for Windows

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CR_DIR: C:\src\chromium
  CR_SRC_DIR: C:\src\chromium\src
  THORIUM_DIR: C:\src\thorium

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
      - name: Checkout Thorium
        uses: actions/checkout@v4
        with:
          path: thorium

      - name: Free disk space
        run: |
          # Remove unnecessary tools to free space
          Remove-Item -Recurse -Force "C:\Program Files\dotnet" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Android" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Microsoft SQL Server" -ErrorAction SilentlyContinue

      - name: Install depot_tools
        run: |
          $url = "https://storage.googleapis.com/chrome-infra/depot_tools.zip"
          New-Item -ItemType Directory -Path "C:\src" -Force
          Invoke-WebRequest -Uri $url -OutFile "C:\src\depot_tools.zip"
          Expand-Archive -Path "C:\src\depot_tools.zip" -DestinationPath "C:\src"
          Remove-Item "C:\src\depot_tools.zip"
        shell: pwsh

      - name: Run gclient
        run: |
          set PATH=C:\src\depot_tools;%PATH%
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          set vs2022_install=C:\Program Files\Microsoft Visual Studio\2022\Enterprise
          gclient
        shell: cmd

      - name: Fetch Chromium source
        run: |
          set PATH=C:\src\depot_tools;%PATH%
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          set vs2022_install=C:\Program Files\Microsoft Visual Studio\2022\Enterprise
          mkdir C:\src\chromium
          cd C:\src\chromium
          fetch chromium --no-history
        shell: cmd

      - name: Run setup scripts
        run: |
          set PATH=C:\src\depot_tools;%PATH%
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          set vs2022_install=C:\Program Files\Microsoft Visual Studio\2022\Enterprise
          cd C:\src\chromium\src
          bash %GITHUB_WORKSPACE%/thorium/trunk.sh
          bash %GITHUB_WORKSPACE%/thorium/version.sh
          bash %GITHUB_WORKSPACE%/thorium/setup.sh
        shell: cmd

      - name: Configure build
        run: |
          set PATH=C:\src\depot_tools;%PATH%
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          set vs2022_install=C:\Program Files\Microsoft Visual Studio\2022\Enterprise
          cd C:\src\chromium\src
          gn args out\thorium --args="is_official_build=true is_debug=false is_component_build=false blink_symbol_level=0 symbol_level=0 chrome_pgo_phase=0 treat_warnings_as_errors=false enable_nacl=false proprietary_code=true ffmpeg_branding=\"Chrome\" use_proprietary_codecs=true enable_hangout_services_extension=true enable_widevine=true is_multi_dll_monolithic=false use_thin_lto=true clang_use_chrome_plugins=false use_lld=true"
        shell: cmd

      - name: Build
        run: |
          set PATH=C:\src\depot_tools;%PATH%
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          set vs2022_install=C:\Program Files\Microsoft Visual Studio\2022\Enterprise
          cd C:\src\chromium\src
          autoninja -C out\thorium chrome chromedriver mini_installer -j4
        shell: cmd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chromium-windows-x64
          path: |
            C:\src\chromium\src\out\thorium\chrome.exe
            C:\src\chromium\src\out\thorium\mini_installer.exe
            C:\src\chromium\src\out\thorium\chromedriver.exe
          retention-days: 7
